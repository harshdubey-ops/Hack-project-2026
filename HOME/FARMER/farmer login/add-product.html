<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product - Farmer Dashboard</title>
  <link rel="stylesheet" href="farmer-dashboard.css">
</head>
<body>
  <div class="dash-container">
    <header>
      <h1 id="pageTitle">Add New Product</h1>
      <div class="actions">
        <a href="farmer-dashboard.html">Back to Dashboard</a>
      </div>
    </header>

    <main>
      <section class="add-product">
        <h3>Product Details</h3>
        <div class="form-row">
          <label>Product Name</label>
          <input id="prodName" type="text" placeholder="e.g. Fresh Tomatoes">
        </div>
        <div class="form-row">
          <label>Price (₹/kg)</label>
          <input id="prodPrice" type="number" step="0.01" placeholder="e.g. 40">
        </div>
        <div class="form-row">
          <label>Quantity (kg)</label>
          <input id="prodQty" type="number" step="0.01" placeholder="e.g. 100">
        </div>
        <div class="form-row">
          <label>Image File (optional)</label>
          <input id="prodImageFile" type="file" accept="image/*">
          <small>Or provide an image URL below</small>
        </div>
        <div class="form-row">
          <label>Preview</label>
          <img id="prodPreview" class="preview hidden" alt="Image preview">
        </div>
        <div class="form-row">
          <label>Image URL (optional)</label>
          <input id="prodImage" type="text" placeholder="Optional image URL">
        </div>
        <div class="form-row">
          <label>Notes</label>
          <input id="prodNotes" type="text" placeholder="Optional notes">
        </div>
        <div class="form-row">
          <label>Category</label>
          <input id="prodCategory" type="text" placeholder="e.g. Vegetables, Fruits">
        </div>
        <div class="form-row">
          <label>Location</label>
          <input id="prodLocation" type="text" placeholder="e.g. Delhi, Farm Location">
        </div>
        <div class="form-actions">
          <button id="saveProductBtn">Save Product</button>
          <button id="cancelBtn">Cancel</button>
        </div>
      </section>
    </main>
  </div>

<script src="../../shared/apiOrigin.js"></script>
<script src="../../shared/authFetch.js"></script>
<script src="../../shared/global.js"></script>
<script>
  const API_BASE = (window.F2C_API_ORIGIN || 'http://localhost:5000') + '/api';

  // ---------- Helper functions ----------
  function getProductsLocal() {
    try { return JSON.parse(localStorage.getItem('localProducts') || '[]'); } catch (e) { return []; }
  }
  function saveProductsLocal(products) { localStorage.setItem('localProducts', JSON.stringify(products)); }
  function getCurrentUser() { return JSON.parse(localStorage.getItem('currentUser') || 'null'); }

  // ---------- Load profile ----------
  async function loadProfile() {
    try {
      const meRes = (window.fetchWithAuth)
        ? await fetchWithAuth(API_BASE + '/user/me')
        : await fetch(API_BASE + '/user/me', { credentials: 'include' });
      if (meRes && meRes.ok) {
        const data = await meRes.json();
        const u = data.user;
        localStorage.setItem('currentUser', JSON.stringify({ 
          id: String(u._id != null ? u._id : u.id), 
          name: u.name, 
          email: u.email, 
          role: u.role 
        }));
        return;
      }
    } catch (err) {
      console.warn('Failed to fetch profile from server:', err);
    }
    const current = JSON.parse(localStorage.getItem('currentUser'));
    if (!current || current.role !== 'farmer') {
      window.location.href = 'farmer-login.html';
    }
  }
  loadProfile();

  // ---------- Edit mode ----------
  const urlParams = new URLSearchParams(window.location.search);
  const editId = urlParams.get('edit');
  let editingId = null;

  function populateForm(product) {
    document.getElementById('prodName').value = product.name || '';
    document.getElementById('prodPrice').value = product.price || '';
    document.getElementById('prodQty').value = product.quantity || '';
    document.getElementById('prodImage').value = product.image || '';
    document.getElementById('prodNotes').value = product.notes || '';
    document.getElementById('prodCategory').value = product.category || '';
    document.getElementById('prodLocation').value = product.location || '';
  }

  if (editId) {
    document.getElementById('pageTitle').innerText = 'Edit Product';
    document.getElementById('saveProductBtn').innerText = 'Update Product';
    const products = getProductsLocal();
    const product = products.find(p => (p._id || p.id) === editId);
    if (product) {
      editingId = editId;
      populateForm(product);
    } else {
      window.showToast('Product not found', 'error');
      window.location.href = 'view-inventory.html';
    }
  }

  // ---------- Save / Update logic ----------
  async function saveProduct(product, file) {
    const user = getCurrentUser();
    if (!user) {
      const all = getProductsLocal();
      all.push(product);
      saveProductsLocal(all);
      return { ok: true, source: 'local' };
    }

    product.ownerId = user.id;
    const useFetchWithAuth = !!window.fetchWithAuth;
    try {
      let response;
      if (file) {
        const formData = new FormData();
        formData.append('name', product.name);
        formData.append('price', product.price);
        formData.append('quantity', product.quantity);
        if (product.notes) formData.append('notes', product.notes);
        if (product.category) formData.append('category', product.category);
        if (product.location) formData.append('location', product.location);
        formData.append('ownerId', product.ownerId);
        formData.append('image', file, file.name);

        if (useFetchWithAuth) {
          response = await fetchWithAuth(API_BASE + '/products', { method: 'POST', body: formData });
        } else {
          response = await fetch(API_BASE + '/products', { method: 'POST', body: formData, credentials: 'include' });
        }
      } else {
        const payload = { ...product };
        if (useFetchWithAuth) {
          response = await fetchWithAuth(API_BASE + '/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        } else {
          response = await fetch(API_BASE + '/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
        }
      }
      if (response && response.ok) {
        const data = await response.json();
        const all = getProductsLocal();
        all.push({ ...data.product, ownerId: user.id });
        saveProductsLocal(all);
        return { ok: true, source: 'server' };
      } else {
        const errText = response ? await response.text() : 'No response';
        console.warn('Server save failed:', errText);
      }
    } catch (err) {
      console.warn('Server product save failed, falling back to local', err);
    }

    // Fallback to local storage
    if (file) {
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        product.image = dataUrl;
      } catch (e) {
        console.warn('Failed to read file locally', e);
      }
    }
    const all = getProductsLocal();
    all.push(product);
    saveProductsLocal(all);
    return { ok: true, source: 'local' };
  }

  async function updateProduct(product, file) {
    const productId = editingId;
    if (!productId) return { ok: false };

    const user = getCurrentUser();
    product.ownerId = user.id;
    const useFetchWithAuth = !!window.fetchWithAuth;
    try {
      let response;
      if (file) {
        const formData = new FormData();
        formData.append('name', product.name);
        formData.append('price', product.price);
        formData.append('quantity', product.quantity);
        if (product.notes) formData.append('notes', product.notes);
        if (product.category) formData.append('category', product.category);
        if (product.location) formData.append('location', product.location);
        formData.append('image', file, file.name);

        if (useFetchWithAuth) {
          response = await fetchWithAuth(`${API_BASE}/products/${productId}`, { method: 'PUT', body: formData });
        } else {
          response = await fetch(`${API_BASE}/products/${productId}`, { method: 'PUT', body: formData, credentials: 'include' });
        }
      } else {
        const payload = { ...product };
        if (useFetchWithAuth) {
          response = await fetchWithAuth(`${API_BASE}/products/${productId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        } else {
          response = await fetch(`${API_BASE}/products/${productId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
        }
      }
      if (response && response.ok) {
        const data = await response.json();
        const all = getProductsLocal().map(p => ((p._id || p.id) === productId ? { ...data.product, ownerId: user.id } : p));
        saveProductsLocal(all);
        return { ok: true, source: 'server', product: data.product };
      }
    } catch (err) {
      console.warn('Update failed, saving locally:', err);
    }

    // fallback local update
    const all = getProductsLocal().map(p => {
      if ((p._id || p.id) !== productId) return p;
      return { ...p, ...product, ownerId: user.id };
    });
    saveProductsLocal(all);
    return { ok: true, source: 'local' };
  }

  // ---------- Image preview ----------
  const fileInput = document.getElementById('prodImageFile');
  const previewImg = document.getElementById('prodPreview');
  let currentPreviewUrl = null;

  function clearPreview() {
    if (currentPreviewUrl) {
      URL.revokeObjectURL(currentPreviewUrl);
      currentPreviewUrl = null;
    }
    previewImg.src = '';
    previewImg.classList.add('hidden');
    if (fileInput) fileInput.value = '';
  }

  if (fileInput) {
    fileInput.addEventListener('change', () => {
      const f = fileInput.files && fileInput.files[0];
      if (!f) return clearPreview();
      if (currentPreviewUrl) URL.revokeObjectURL(currentPreviewUrl);
      currentPreviewUrl = URL.createObjectURL(f);
      previewImg.src = currentPreviewUrl;
      previewImg.classList.remove('hidden');
    });
  }

  const imageUrlInput = document.getElementById('prodImage');
  if (imageUrlInput) {
    imageUrlInput.addEventListener('input', () => {
      const url = imageUrlInput.value.trim();
      if (fileInput && fileInput.files && fileInput.files.length) return;
      if (!url) return clearPreview();
      previewImg.src = url;
      previewImg.classList.remove('hidden');
    });
  }

  // ---------- Save button handler ----------
  document.addEventListener('DOMContentLoaded', () => {
    const saveBtn = document.getElementById('saveProductBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    cancelBtn.addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = editingId ? 'view-inventory.html' : 'farmer-dashboard.html';
    });

    saveBtn.addEventListener('click', async (e) => {
      e.preventDefault();

      // Get form values
      const name = document.getElementById('prodName').value.trim();
      const price = parseFloat(document.getElementById('prodPrice').value);
      const qty = parseFloat(document.getElementById('prodQty').value);
      const imageUrl = document.getElementById('prodImage').value.trim();
      const file = fileInput && fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
      const notes = document.getElementById('prodNotes').value.trim();
      const category = document.getElementById('prodCategory').value.trim();
      const location = document.getElementById('prodLocation').value.trim();

      // Validation
      if (!name) {
        window.showToast('Please enter product name', 'error');
        return;
      }
      if (isNaN(price) || price <= 0) {
        window.showToast('Please enter a valid price', 'error');
        return;
      }
      if (isNaN(qty) || qty <= 0) {
        window.showToast('Please enter a valid quantity', 'error');
        return;
      }

      const user = getCurrentUser();
      if (!user) {
        window.showToast('You are not logged in', 'error');
        return;
      }

      const product = {
        id: editingId || 'p' + Date.now(),
        name,
        price,
        quantity: qty,
        image: imageUrl,
        notes,
        category,
        location,
        ownerId: user.id,
        createdAt: new Date().toISOString()
      };

      // Show loading state on button
      const originalText = saveBtn.innerText;
      saveBtn.innerText = editingId ? 'Updating...' : 'Saving...';
      saveBtn.disabled = true;

      const result = editingId ? await updateProduct(product, file) : await saveProduct(product, file);

      saveBtn.innerText = originalText;
      saveBtn.disabled = false;

      if (result && result.ok !== false) {
        window.showToast(`Product ${editingId ? 'updated' : 'added'} successfully!`, 'success');
        if (editingId) {
          window.location.href = 'view-inventory.html';
        } else {
          // Clear form for adding another product
          document.getElementById('prodName').value = '';
          document.getElementById('prodPrice').value = '';
          document.getElementById('prodQty').value = '';
          document.getElementById('prodImage').value = '';
          document.getElementById('prodNotes').value = '';
          document.getElementById('prodCategory').value = '';
          document.getElementById('prodLocation').value = '';
          clearPreview();
          // Optional: redirect after 2 seconds
          // setTimeout(() => { window.location.href = 'view-inventory.html'; }, 2000);
        }
      } else {
        window.showToast('Failed to save product. Check console for details.', 'error');
      }
    });
  });
</script>
</body>
</html>
