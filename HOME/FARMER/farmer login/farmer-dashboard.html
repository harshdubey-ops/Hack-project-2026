<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Dashboard</title>
  <link rel="stylesheet" href="farmer-dashboard.css">
</head>
<body>
  <div class="dash-container">
    <header>
      <h1 id="welcome">Welcome, Farmer</h1>
      <div class="actions">
        <a href="../../Home Page/index.html">Home</a>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>

    <main>
      <section class="summary">
        <h2>Your Dashboard (MVP)</h2>
        <p>This is a placeholder dashboard. Next steps: add product listing, add product form, inventory view.</p>        <div id="dashboardStatus" class="dashboard-status">Ready.</div>      </section>

      <section class="links">
        <a href="add-product.html"><button>Add Product</button></a>
        <a href="view-inventory.html"><button>View Inventory</button></a>
      </section>

      <!-- Add Product Form -->
      <section class="add-product hidden" id="addProductSection">
        <p>Add product functionality moved to <a href="add-product.html">Add Product page</a>.</p>
      </section>

      <!-- Inventory List -->
      <section class="inventory hidden" id="inventorySection">
        <p>View inventory functionality moved to <a href="view-inventory.html">View Inventory page</a>.</p>
      </section>
    </main>
  </div>

<script>
  // Try to fetch latest profile from backend using cookie-based auth.
  const API_BASE = 'http://localhost:5000/api';

  async function loadProfile() {
    // Check localStorage first
    const current = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!current || current.role !== 'farmer') {
      window.location.href = 'farmer-login.html';
      return;
    }

    document.getElementById('welcome').innerText = `Welcome, ${current.name}`;
    const p = document.createElement('p');
    p.innerText = `Email: ${current.email || ''}`;
    p.style.fontSize = '13px';
    p.style.color = '#444';
    document.querySelector('.summary').appendChild(p);

    // Try to refresh profile from server
    try {
      const meRes = (window.fetchWithAuth)
        ? await fetchWithAuth(API_BASE + '/user/me')
        : await fetch(API_BASE + '/user/me', { credentials: 'include' });
      if (meRes && meRes.ok) {
        const data = await meRes.json();
        const u = data.user;
        if (u.role !== 'farmer') {
          localStorage.removeItem('currentUser');
          window.location.href = 'farmer-login.html';
          return;
        }
        localStorage.setItem('currentUser', JSON.stringify({ id: u._id || u.id, name: u.name, email: u.email, role: u.role }));
        document.getElementById('welcome').innerText = `Welcome, ${u.name}`;
      }
    } catch (err) {
      console.warn('Failed to fetch profile from server:', err);
    }
  }

  loadProfile();

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      if (window.fetchWithAuth) {
        await fetchWithAuth(API_BASE + '/auth/logout', { method: 'POST' });
      } else {
        await fetch(API_BASE + '/auth/logout', { method: 'POST', credentials: 'include' });
      }
    } catch (e) { /* ignore */ }
    localStorage.removeItem('currentUser');
    window.location.href = 'farmer-login.html';
  });
</script>
<script src="../../shared/authFetch.js"></script>
</body>
</html>
