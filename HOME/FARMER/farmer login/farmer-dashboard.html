<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Dashboard</title>
  <link rel="stylesheet" href="farmer-dashboard.css">
</head>
<body>
  <div class="dash-container">
    <header>
      <h1 id="welcome">Welcome, Farmer</h1>
      <div class="actions">
        <a href="../../Home%20Page/index.html">Home</a>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>

    <main>
      <section class="summary">
        <h2>Your Dashboard (MVP)</h2>
        <p>This is a placeholder dashboard. Next steps: add product listing, add product form, inventory view.</p>        <div id="dashboardStatus" class="dashboard-status">Ready.</div>      </section>

      <section class="links">
        <a href="add-product.html"><button>Add Product</button></a>
        <a href="view-inventory.html"><button>View Inventory</button></a>
      </section>

      <!-- Add Product Form -->
      <section class="add-product hidden" id="addProductSection">
        <p>Add product functionality moved to <a href="add-product.html">Add Product page</a>.</p>
      </section>

      <!-- Inventory List -->
      <section class="inventory hidden" id="inventorySection">
        <p>View inventory functionality moved to <a href="view-inventory.html">View Inventory page</a>.</p>
      </section>
    </main>
  </div>

<script src="../../shared/apiOrigin.js"></script>
<script src="../../shared/authFetch.js"></script>
<script>
  // Try to fetch latest profile from backend using cookie-based auth.
  const API_BASE = (window.F2C_API_ORIGIN || 'http://localhost:5000') + '/api';

  async function loadProfile() {
    // Check localStorage first
    const current = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!current || current.role !== 'farmer') {
      window.location.href = 'farmer-login.html';
      return;
    }

    document.getElementById('welcome').innerText = `Welcome, ${current.name}`;
    const p = document.createElement('p');
    p.innerText = `Email: ${current.email || ''}`;
    p.style.fontSize = '13px';
    p.style.color = '#444';
    document.querySelector('.summary').appendChild(p);

    // Try to refresh profile from server
    try {
      const meRes = (window.fetchWithAuth)
        ? await fetchWithAuth(API_BASE + '/user/me')
        : await fetch(API_BASE + '/user/me', { credentials: 'include' });
      if (meRes && meRes.ok) {
        const data = await meRes.json();
        const u = data.user;
        if (String(u.role || '').toLowerCase() !== 'farmer') {
          localStorage.removeItem('currentUser');
          window.location.href = 'farmer-login.html';
          return;
        }
        var uid = u._id != null ? u._id : u.id;
        localStorage.setItem('currentUser', JSON.stringify({ id: uid != null ? String(uid) : '', name: u.name, email: u.email, role: u.role }));
        document.getElementById('welcome').innerText = `Welcome, ${u.name}`;
      }
    } catch (err) {
      console.warn('Failed to fetch profile from server:', err);
    }
  }

  loadProfile();

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      if (window.fetchWithAuth) {
        await fetchWithAuth(API_BASE + '/auth/logout', { method: 'POST' });
      } else {
        await fetch(API_BASE + '/auth/logout', { method: 'POST', credentials: 'include' });
      }
    } catch (e) { /* ignore */ }
    localStorage.removeItem('currentUser');
    window.location.href = 'farmer-login.html';
  });

  async function saveProduct(product, file) {
  const user = getCurrentUser();
  if (!user) {
    // fallback offline
    const all = getProductsLocal();
    all.push(product);
    saveProductsLocal(all);
    window.showToast('Product saved locally (offline mode)', 'info');
    return { ok: true, source: 'local' };
  }

  product.ownerId = user.id;
  const useFetchWithAuth = !!window.fetchWithAuth;
  try {
    let response;
    if (file) {
      const formData = new FormData();
      Object.keys(product).forEach(key => formData.append(key, product[key]));
      formData.append('image', file);
      if (useFetchWithAuth) {
        response = await fetchWithAuth(API_BASE + '/products', { method: 'POST', body: formData });
      } else {
        response = await fetch(API_BASE + '/products', { method: 'POST', body: formData, credentials: 'include' });
      }
    } else {
      const payload = { ...product };
      if (useFetchWithAuth) {
        response = await fetchWithAuth(API_BASE + '/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      } else {
        response = await fetch(API_BASE + '/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify(payload) });
      }
    }
    if (response && response.ok) {
      const data = await response.json();
      const all = getProductsLocal().filter(p => p.id !== product.id);
      all.push({ ...data.product, ownerId: user.id });
      saveProductsLocal(all);
      window.showToast('Product added to marketplace!', 'success');
      return { ok: true, source: 'server' };
    }
  } catch (err) {
    console.warn('Server save failed, using local:', err);
  }
  // fallback local
  const all = getProductsLocal();
  all.push(product);
  saveProductsLocal(all);
  window.showToast('Product saved locally (server unreachable)', 'warning');
  return { ok: true, source: 'local' };
}
</script>
</body>
</html>
