<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fasal Junction</title>

  <link rel="stylesheet" href="Style.css">

  <style>
    
  </style>
</head>

<body>

  <nav>
    <h1 id="title">🌾 Fasal Junction</h1>

    <div>
      <a href="../farmer login/farmer-login.html">
        <button id="farmerBtn">Farmer Login</button>
      </a>

      <a href="../customer login/customer-login.html">
        <button id="customerBtn">Customer Login</button>
      </a>
    </div>
  </nav>

  <!-- Language Buttons -->
  <div class="language-buttons" align="center">
    <button onclick="setEnglish()">English</button>
    <button onclick="setHindi()">हिन्दी</button>
  </div>

  <section class="hero">

    <h2 id="heroTitle">Fresh From Farm To Home</h2>

    <p id="heroText">
      Buy fresh products directly from farmers.
    </p>

    <input type="text" id="searchBox" placeholder="Search Products">

    <button id="searchBtn">Search</button>

  </section>

  <section class="products">

    <div class="card">

      <img src="https://via.placeholder.com/250" alt="product">

      <h3 id="productName">Fresh Tomatoes</h3>

      <p id="price">₹40/kg</p>

      <button onclick="addToCart()" id="cartBtn">
        Add To Cart
      </button>

    </div>

  </section>

  <script src="Script.js"></script>

</body>
</html>
